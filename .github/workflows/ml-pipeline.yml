name: ML CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training script
        run: |
          echo "Running training script..."
          python -u train.py

      - name: Validate training output
        run: |
          python -c "import os; \
          assert os.path.exists('best_model.pkl'), 'Model not created!'; \
          print('Model exists ✔')"

      - name: Start API server
        run: |
          nohup uvicorn app:app --host 0.0.0.0 --port 8000 &

      - name: Wait for API
        run: sleep 5

      - name: Test API
        run: |
          curl -X POST http://127.0.0.1:8000/predict \
          -H "Content-Type: application/json" \
          -d '{"features":[5.1,3.5,1.4,0.2]}'

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            best_model.pkl
            experiment_log.json

      - name: validate experiment log 
        run: |
          python -c "import json; \
          data = json.load(open('experiment_log.json')); \
          print(data)"

      - name: Validate model exists
        run: |
          python -c "import os; \
          assert os.path.exists('best_model.pkl'), 'Model not found in artifact!'; \
          print('Model artifact exists ✔')"